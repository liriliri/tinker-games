name: Deploy to Server

run-name: Deploy ${{ github.event.inputs.game }} to Server

on:
  workflow_dispatch:
    inputs:
      game:
        description: 'Game'
        required: true

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - run: |
          npm i
          cd packages/tinker-${{ github.event.inputs.game }}
          npm run build
          mkdir ../deploy
          cp -r dist/* ../deploy/
      - uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          source: "packages/deploy/"
          target: "/var/www/liriliri/tinker/games/${{ github.event.inputs.game }}"
          strip_components: 2
