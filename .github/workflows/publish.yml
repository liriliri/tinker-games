name: Publish to NPM

run-name: Publish ${{ github.event.inputs.game }} to NPM

on:
  workflow_dispatch:
    inputs:
      game:
        description: 'Game'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  publish:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
      - run: |
          npm i -g npm@11.10.0
          npm i
          cd packages/tinker-${{ github.event.inputs.game }}
          npm run build
          npm publish
